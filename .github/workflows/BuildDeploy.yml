name: BuildDeploy

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Release level'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

      channel:
        description: 'Release channel. none = stable RTM; alpha/beta/rc cut a pre-release.'
        required: true
        default: none
        type: choice
        options:
          - none
          - alpha
          - beta
          - rc

      sourceRef:
        description: 'Optional git ref (tag/branch/SHA) to release from. Leave blank to release from this branch.'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  id-token: write
  packages: read

env:
  configuration: Release

jobs:
  release:
    runs-on: windows-latest
    environment:
      name: release
    outputs:
      semver2: ${{ steps.minver.outputs.NuGetPackageVersion }}
      tag: ${{ steps.tagname.outputs.tag }}
      prerelease: ${{ steps.tagname.outputs.prerelease }}
      sourceSha: ${{ steps.sourcesha.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.sourceRef }}
          fetch-depth: 0

      - name: Resolve built commit SHA
        id: sourcesha
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compute release version
        id: release-version
        shell: bash
        env:
          BUMP: ${{ inputs.bump }}
          CHANNEL: ${{ inputs.channel }}
          TAG_PREFIX: v
          MINIMUM_MAJOR_MINOR: '3.2'
        run: |
          set -euo pipefail

          case "$BUMP" in
            major|minor|patch) ;;
            *)
              echo "::error::bump must be one of major|minor|patch (got '$BUMP')."
              exit 1
              ;;
          esac

          case "$CHANNEL" in
            none) PRE_RELEASE_ID="" ;;
            alpha|beta|rc) PRE_RELEASE_ID="$CHANNEL" ;;
            *)
              echo "::error::channel must be none|alpha|beta|rc (got '$CHANNEL')."
              exit 1
              ;;
          esac

          FLOOR="${MINIMUM_MAJOR_MINOR}.0"
          LAST="$(
            git tag --list "${TAG_PREFIX}[0-9]*.[0-9]*.[0-9]*" \
              | grep -Ev -- '-' \
              | sort -V \
              | tail -1 \
              | sed "s/^${TAG_PREFIX}//" || true
          )"

          BASELINE="$FLOOR"
          if [ -n "$LAST" ]; then
            BASELINE="$(printf '%s\n%s\n' "$FLOOR" "$LAST" | sort -V | tail -1)"
          else
            echo "No RTM tag (${TAG_PREFIX}X.Y.Z) found; using MinVer floor ${FLOOR} as the release baseline."
          fi

          IFS=. read -r MAJOR MINOR PATCH <<< "$BASELINE"
          case "$BUMP" in
            major) CORE="$((MAJOR + 1)).0.0" ;;
            minor) CORE="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) CORE="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          if [ -n "$PRE_RELEASE_ID" ]; then
            MAXN=0
            while IFS= read -r tag; do
              [ -z "$tag" ] && continue

              number="${tag##*.}"
              case "$number" in
                ''|*[!0-9]*) continue ;;
              esac

              if [ "$number" -gt "$MAXN" ]; then
                MAXN="$number"
              fi
            done < <(git tag --list "${TAG_PREFIX}${CORE}-${PRE_RELEASE_ID}.[0-9]*")

            VERSION="${CORE}-${PRE_RELEASE_ID}.$((MAXN + 1))"
            PRERELEASE=true
          else
            VERSION="$CORE"
            PRERELEASE=false
          fi

          TAG="${TAG_PREFIX}${VERSION}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "::error::Tag ${TAG} already exists. Refusing to re-release an existing version."
            exit 1
          fi

          echo "Release baseline: ${TAG_PREFIX}${BASELINE} -> next (${BUMP}${PRE_RELEASE_ID:+, ${PRE_RELEASE_ID}}): ${TAG}"

          {
            echo "version=${VERSION}"
            echo "tag=${TAG}"
            echo "prerelease=${PRERELEASE}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "MINVERVERSIONOVERRIDE=${VERSION}"
            echo "MinVerVersionOverride=${VERSION}"
          } >> "$GITHUB_ENV"

      - name: Resolve release tag
        id: tagname
        shell: bash
        run: |
          {
            echo "tag=${{ steps.release-version.outputs.tag }}"
            echo "prerelease=${{ steps.release-version.outputs.prerelease }}"
          } >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
            11.0.x
          dotnet-quality: 'preview'
          cache: true
          cache-dependency-path: |
            **/Directory.Packages.props
            **/*.csproj
            **/global.json
            **/nuget.config

      - name: Cache NuGet HTTP v3 feed responses
        uses: actions/cache@v6
        with:
          path: '%LOCALAPPDATA%\NuGet\v3-cache'
          key: ${{ runner.os }}-nugetv3-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj', '**/global.json', '**/nuget.config') }}
          restore-keys: |
            ${{ runner.os }}-nugetv3-

      - name: Restore .NET workloads
        shell: bash
        working-directory: src
        run: dotnet workload restore Extensions.Hosting.slnx --from-previous-sdk --skip-manifest-update

      - name: Stamp version with MinVer
        id: minver
        uses: reactiveui/actions-common/.github/actions/minver@main
        with:
          tag-prefix: v
          minimum-major-minor: '3.2'
          auto-increment: minor
          default-pre-release-identifiers: alpha.0
          version-override: ${{ steps.release-version.outputs.version }}

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v3
        with:
          vs-prerelease: true

      - name: Build
        uses: reactiveui/actions-common/.github/actions/dotnet-build@main
        env:
          MINVERVERSIONOVERRIDE: ${{ steps.minver.outputs.SemVer2 }}
          MinVerVersionOverride: ${{ steps.minver.outputs.SemVer2 }}
        with:
          configuration: ${{ env.configuration }}
          src-folder: src
          solution-file: Extensions.Hosting.slnx
          create-packages: 'false'

      - name: Pack unsigned NuGet packages
        shell: bash
        working-directory: src
        env:
          MINVERVERSIONOVERRIDE: ${{ steps.minver.outputs.SemVer2 }}
          MinVerVersionOverride: ${{ steps.minver.outputs.SemVer2 }}
        run: dotnet pack --no-restore --configuration "${{ env.configuration }}" Extensions.Hosting.slnx -o "${GITHUB_WORKSPACE}/packages" -p:MinVerVersionOverride="${{ steps.minver.outputs.SemVer2 }}"

      - name: Upload unsigned packages
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-nuget
          path: packages/*.nupkg
          if-no-files-found: error

  publish-nuget:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      id-token: write
    steps:
      - name: Download unsigned packages
        uses: actions/download-artifact@v8
        with:
          name: unsigned-nuget

      - name: Setup .NET
        uses: actions/setup-dotnet@v5

      - name: NuGet login (OIDC trusted publishing)
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        shell: bash
        run: |
          for pkg in *.nupkg; do
            dotnet nuget push "$pkg" --source https://api.nuget.org/v3/index.json --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          done

  create-release:
    needs: [release, publish-nuget]
    uses: reactiveui/actions-common/.github/workflows/workflow-common-create-release.yml@main
    with:
      version: ${{ needs.release.outputs.semver2 }}
      tag: ${{ needs.release.outputs.tag }}
      target: ${{ needs.release.outputs.sourceSha }}
      prerelease: ${{ needs.release.outputs.prerelease == 'true' }}
      artifactName: unsigned-nuget
